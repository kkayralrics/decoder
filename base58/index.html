<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kayralrics.net</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#fff;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:20px;
}

.card{
    border:1px solid #ff0000;
    background:#000;
}

.title{
    padding:15px;
    border-bottom:1px solid #ff0000;
    font-weight:bold;
    font-size:18px;
}

.content{
    padding:20px;
}

textarea{
    width:100%;
    height:300px;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:15px;
    resize:vertical;
    font-size:15px;
}

.buttons{
    margin-top:15px;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#111;
}
</style>
</head>
<body>

<h1>Base58 - kayralrics.co</h1>

<div class="grid">

<div class="card">
<div class="title">Normal Text</div>
<div class="content">

<textarea id="plain"></textarea>

<div class="buttons">
<button onclick="copyText('plain',this)">
Copy
</button>
</div>

</div>
</div>

<div class="card">
<div class="title">Base58 Text :>>></div>
<div class="content">

<textarea id="b58"></textarea>

<div class="buttons">
<button onclick="copyText('b58',this)">
Copy
</button>
</div>

</div>
</div>

</div>

<script>
const ALPHABET =
"123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

function encodeBase58(str){

    const bytes =
        new TextEncoder().encode(str);

    let num = 0n;

    for(const b of bytes){
        num = (num << 8n) + BigInt(b);
    }

    let out = "";

    while(num > 0n){
        const rem = num % 58n;
        out = ALPHABET[Number(rem)] + out;
        num = num / 58n;
    }

    for(const b of bytes){
        if(b === 0){
            out = "1" + out;
        }else{
            break;
        }
    }

    return out || "1";
}

function decodeBase58(text){

    let num = 0n;

    for(const c of text){

        const i =
            ALPHABET.indexOf(c);

        if(i === -1)
            throw new Error();

        num =
            num * 58n +
            BigInt(i);
    }

    const bytes = [];

    while(num > 0n){
        bytes.unshift(
            Number(num & 255n)
        );
        num >>= 8n;
    }

    for(const c of text){
        if(c === "1"){
            bytes.unshift(0);
        }else{
            break;
        }
    }

    return new TextDecoder()
        .decode(
            new Uint8Array(bytes)
        );
}

const plain =
    document.getElementById("plain");

const b58 =
    document.getElementById("b58");

let updating = false;

plain.addEventListener("input",()=>{

    if(updating) return;

    updating = true;

    try{
        b58.value =
            encodeBase58(
                plain.value
            );
    }catch{
        b58.value = "";
    }

    updating = false;
});

b58.addEventListener("input",()=>{

    if(updating) return;

    updating = true;

    try{
        plain.value =
            decodeBase58(
                b58.value
            );
    }catch{
        plain.value = "";
    }

    updating = false;
});

async function copyText(id,btn){

    const text =
        document.getElementById(id)
        .value;

    try{
        await navigator.clipboard
            .writeText(text);
    }catch{
        const t =
            document.getElementById(id);

        t.select();
        document.execCommand("copy");
    }

    const old =
        btn.textContent;

    btn.textContent =
        "Copied!";

    setTimeout(()=>{
        btn.textContent = old;
    },1500);
}
</script>

</body>
</html>
