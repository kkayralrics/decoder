<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kayralrics.cc</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#fff;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:20px;
}

.card{
    border:1px solid #ff0000;
    background:#000;
}

.title{
    padding:15px;
    border-bottom:1px solid #ff0000;
    font-weight:bold;
    font-size:18px;
}

.content{
    padding:20px;
}

textarea{
    width:100%;
    height:300px;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:15px;
    resize:vertical;
    font-size:15px;
}

.buttons{
    margin-top:15px;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:10px 20px;
    cursor:pointer;
    transition:0.15s;
}

button:hover{
    background:#111;
}

button:active{
    background:#220000;
}
</style>
</head>
<body>

<h1>Base64 - kayralrics.cc</h1>

<div class="grid">

    <div class="card">
        <div class="title">Normal Text</div>
        <div class="content">
            <textarea
                id="plain"
                placeholder="Write normal text..."
            ></textarea>

            <div class="buttons">
                <button onclick="copyText('plain',this)">
                    Copy
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="title">Base64 Text :></div>
        <div class="content">
            <textarea
                id="b64"
                placeholder="Write Base64..."
            ></textarea>

            <div class="buttons">
                <button onclick="copyText('b64',this)">
                    Copy
                </button>
            </div>
        </div>
    </div>

</div>

<script>
function encodeBase64(str){
    return btoa(
        unescape(
            encodeURIComponent(str)
        )
    );
}

function decodeBase64(str){
    return decodeURIComponent(
        escape(
            atob(str)
        )
    );
}

const plain =
    document.getElementById("plain");

const b64 =
    document.getElementById("b64");

let updating = false;

plain.addEventListener("input", () => {

    if(updating) return;

    updating = true;

    try{
        b64.value =
            encodeBase64(
                plain.value
            );
    }
    catch{
        b64.value = "";
    }

    updating = false;
});

b64.addEventListener("input", () => {

    if(updating) return;

    updating = true;

    try{
        plain.value =
            decodeBase64(
                b64.value
            );
    }
    catch{
        plain.value = "";
    }

    updating = false;
});

async function copyText(id, btn){

    const text =
        document.getElementById(id).value;

    try{
        await navigator
            .clipboard
            .writeText(text);
    }
    catch{
        const textarea =
            document.getElementById(id);

        textarea.select();
        document.execCommand("copy");
        window.getSelection()
              .removeAllRanges();
    }

    const old =
        btn.textContent;

    btn.textContent =
        "Copied!";

    setTimeout(() => {
        btn.textContent = old;
    }, 1500);
}
</script>

</body>
</html>
