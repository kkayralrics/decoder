<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Consolas, monospace;

body{
    background:#000;

    text-align:center;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:20px;
}
.card{
    border:1px solid #ff0000;

}

    padding:15px;

}

    width:100%;

}
textarea{
    height:300px;
    resize:vertical;
}
input{
    margin-bottom:15px;
}
.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
button{
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:10px 20px;

    background:#111;

<body>

<h1>AES-256 kayralrics.co</h1>

<div class="grid">

<div class="card">
<div class="title">Input</div>
<div class="content">
<!-- kayralrics.net -->
<input
    type="password"
    id="password"
    placeholder="Password"
>

<textarea
    id="plain"
    placeholder="Write text here..."
></textarea>
<!-- kayralrics.net -->
<div class="buttons">
    <button onclick="encryptText()">
        Encrypt
    </button>
<!-- kayralrics.net -->
    <button onclick="decryptText()">
        Decrypt
    </button>
<!-- kayralrics.net -->
    <button onclick="copyText('plain',this)">
        Copy
    </button>
</div>
<!-- kayralrics.net -->
</div>
</div>

<div class="card">
<div class="title">Output</div>
<div class="content">
<!-- kayralrics.net -->
<textarea
    id="output"
    placeholder="Result..."
></textarea>

<div class="buttons">
    <button onclick="copyText('output',this)">
        Copy
    </button>
</div>
<!-- kayralrics.net -->
</div>
</div>
<!-- kayralrics.net -->
</div>
<!-- kayralrics.net -->
<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

async function getKey(password, salt){

    const keyMaterial =
        await crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            "PBKDF2",
            false,
            ["deriveKey"]
        );

    return crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt,
            iterations: 100000,
            hash: "SHA-256"
        },
        keyMaterial,
        {
            name: "AES-GCM",
            length: 256
        },
        false,
        ["encrypt","decrypt"]
    );
}

function toBase64(bytes){
    return btoa(
        String.fromCharCode(...bytes)
    );
}

function fromBase64(str){
    return Uint8Array.from(
        atob(str),
        c => c.charCodeAt(0)
    );
}

async function encryptText(){

    const text =
        document.getElementById("plain").value;

    const password =
        document.getElementById("password").value;

    if(!password){
        alert("Enter a password.");
        return;
    }

    const salt =
        crypto.getRandomValues(
            new Uint8Array(16)
        );

    const iv =
        crypto.getRandomValues(
            new Uint8Array(12)
        );

    const key =
        await getKey(password, salt);

    const encrypted =
        await crypto.subtle.encrypt(
            {
                name:"AES-GCM",
                iv
            },
            key,
            enc.encode(text)
        );

    const cipher =
        new Uint8Array(encrypted);

    const result =
        new Uint8Array(
            salt.length +
            iv.length +
            cipher.length
        );

    result.set(salt,0);
    result.set(iv,salt.length);
    result.set(
        cipher,
        salt.length + iv.length
    );

    document.getElementById(
        "output"
    ).value = toBase64(result);
}

async function decryptText(){

    const password =
        document.getElementById("password").value;

    const data =
        document.getElementById("plain")
        .value
        .trim();

    if(!password){
        alert("Enter a password.");
        return;
    }

    try{

        const bytes =
            fromBase64(data);

        const salt =
            bytes.slice(0,16);

        const iv =
            bytes.slice(16,28);

        const cipher =
            bytes.slice(28);

        const key =
            await getKey(
                password,
                salt
            );

        const decrypted =
            await crypto.subtle.decrypt(
                {
                    name:"AES-GCM",
                    iv
                },
                key,
                cipher
            );

        document.getElementById(
            "output"
        ).value =
            dec.decode(decrypted);

    }catch{
        alert(
            "Wrong password or invalid data."
        );
    }
}

async function copyText(id,btn){

    const text =
        document.getElementById(id)
        .value;

    try{
        await navigator.clipboard
            .writeText(text);
    }catch{
        const t =
            document.getElementById(id);

        t.select();
        document.execCommand("copy");
    }

    const old =
        btn.textContent;

    btn.textContent =
        "Copied!";

    setTimeout(()=>{
        btn.textContent = old;
    },1500);
}
</script>
