<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kayralrics.com</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#fff;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:20px;
}

.card{
    border:1px solid #ff0000;
    background:#000;
}

.title{
    padding:15px;
    border-bottom:1px solid #ff0000;
    font-weight:bold;
}

.content{
    padding:20px;
}

textarea{
    width:100%;
    height:300px;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:15px;
    resize:vertical;
    font-size:15px;
}

.buttons{
    margin-top:15px;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#111;
}
</style>
</head>
<body>

<h1>ROT13 - kayralrics.net</h1>

<div class="grid">

    <div class="card">
        <div class="title">Normal Text</div>
        <div class="content">
            <textarea id="plain"></textarea>

            <div class="buttons">
                <button onclick="copy('plain')">Copy</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="title">ROT13 Text</div>
        <div class="content">
            <textarea id="rot"></textarea>

            <div class="buttons">
                <button onclick="copy('rot')">Copy</button>
            </div>
        </div>
    </div>

</div>

<script>
function rot13(str){
    return str.replace(/[a-zA-Z]/g, c => {
        const start = c <= "Z" ? 65 : 97;
        return String.fromCharCode(
            (c.charCodeAt(0) - start + 13) % 26 + start
        );
    });
}

const plain = document.getElementById("plain");
const rot = document.getElementById("rot");

let updating = false;

plain.addEventListener("input", () => {
    if (updating) return;
    updating = true;
    rot.value = rot13(plain.value);
    updating = false;
});

rot.addEventListener("input", () => {
    if (updating) return;
    updating = true;
    plain.value = rot13(rot.value);
    updating = false;
});

function copy(id){
    navigator.clipboard.writeText(
        document.getElementById(id).value
    );
}
</script>

</body>
</html>
