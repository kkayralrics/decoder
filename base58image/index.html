<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kayralrics.xyz</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Consolas, monospace;
}
body{
    background:#000;
    color:#fff;
    padding:30px;
}
h1{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
    gap:20px;
}
.card{
    border:1px solid #ff0000;
    background:#000;
}
.title{
    padding:15px;
    border-bottom:1px solid #ff0000;
    font-weight:bold;
}
.content{
    padding:20px;
}
textarea{
    width:100%;
    height:350px;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:15px;
    resize:vertical;
}
input[type=file]{
    width:100%;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:12px;
    margin-bottom:15px;
}
.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
button{
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:10px 20px;
    cursor:pointer;
}
button:hover{
    background:#111;
}
.preview{
    min-height:350px;
    border:1px solid #ff0000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:auto;
    padding:20px;
}
.preview img{
    max-width:100%;
    max-height:700px;
}
.message{
    color:#888;
}
</style>
</head>
<body>

<h1>Base58 Image - kayralrics.xyz</h1>

<div class="grid">

<div class="card">
<div class="title">Base58</div>
<div class="content">

<input type="file" id="file" accept="image/*">

<textarea
id="input"
placeholder="Paste Base58 or upload image..."
></textarea>

<div class="buttons">

<button onclick="imageToBase58()">
Image → Base58
</button>

<button onclick="base58ToImage()">
Base58 → Image
</button>

<button onclick="clearAll()">
Clear
</button>

<button onclick="copyText(this)">
Copy
</button>

</div>

</div>
</div>

<div class="card">
<div class="title">Preview</div>
<div class="content">

<div id="preview" class="preview">
<div class="message">
Image preview will appear here.
</div>
</div>

</div>
</div>

</div>

<script>
const ALPHABET =
"123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

function encodeBase58(bytes){

    let num = 0n;

    for(const b of bytes){
        num = (num << 8n) + BigInt(b);
    }

    let out = "";

    while(num > 0n){
        const rem = num % 58n;
        out = ALPHABET[Number(rem)] + out;
        num /= 58n;
    }

    for(const b of bytes){
        if(b === 0){
            out = "1" + out;
        }else{
            break;
        }
    }

    return out || "1";
}

function decodeBase58(str){

    let num = 0n;

    for(const c of str){

        const i =
            ALPHABET.indexOf(c);

        if(i === -1)
            throw new Error();

        num =
            num * 58n +
            BigInt(i);
    }

    const bytes = [];

    while(num > 0n){
        bytes.unshift(
            Number(num & 255n)
        );
        num >>= 8n;
    }

    for(const c of str){
        if(c === "1"){
            bytes.unshift(0);
        }else{
            break;
        }
    }

    return new Uint8Array(bytes);
}

const input =
    document.getElementById("input");

const preview =
    document.getElementById("preview");

let currentMime =
    "image/png";

function imageToBase58(){

    const file =
        document.getElementById("file")
        .files[0];

    if(!file){
        alert("Select an image.");
        return;
    }

    currentMime =
        file.type || "image/png";

    const reader =
        new FileReader();

    reader.onload = e => {

        const bytes =
            new Uint8Array(
                e.target.result
            );

        input.value =
            encodeBase58(bytes);

        const img =
            new Image();

        img.src =
            URL.createObjectURL(file);

        preview.innerHTML = "";
        preview.appendChild(img);
    };

    reader.readAsArrayBuffer(file);
}

function base58ToImage(){

    try{

        const bytes =
            decodeBase58(
                input.value.trim()
            );

        const blob =
            new Blob(
                [bytes],
                {type: currentMime}
            );

        const url =
            URL.createObjectURL(blob);

        const img =
            new Image();

        img.onload = () => {
            preview.innerHTML = "";
            preview.appendChild(img);
        };

        img.src = url;
    }
    catch{
        preview.innerHTML =
            '<div class="message">Invalid Base58.</div>';
    }
}

function clearAll(){

    input.value = "";
    document.getElementById("file")
        .value = "";

    preview.innerHTML =
        '<div class="message">Image preview will appear here.</div>';
}

async function copyText(btn){

    try{
        await navigator
            .clipboard
            .writeText(
                input.value
            );
    }
    catch{
        input.select();
        document.execCommand("copy");
    }

    const old =
        btn.textContent;

    btn.textContent =
        "Copied!";

    setTimeout(()=>{
        btn.textContent = old;
    },1500);
}
</script>

</body>
</html>
