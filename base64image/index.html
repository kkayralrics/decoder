<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kayralrics.net</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Consolas, monospace;
}

body{
    background:#000;
    color:#fff;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(500px,1fr));
    gap:20px;
}

.card{
    border:1px solid #ff0000;
    background:#000;
}

.title{
    padding:15px;
    border-bottom:1px solid #ff0000;
    font-weight:bold;
    font-size:18px;
}

.content{
    padding:20px;
}

textarea{
    width:100%;
    height:350px;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:15px;
    resize:vertical;
    font-size:14px;
}

input[type=file]{
    width:100%;
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:12px;
    margin-bottom:15px;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    background:#000;
    color:#fff;
    border:1px solid #ff0000;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#111;
}

.preview{
    min-height:350px;
    border:1px solid #ff0000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:auto;
    padding:20px;
}

.preview img{
    max-width:100%;
    max-height:700px;
}

.message{
    color:#888;
    text-align:center;
}
</style>
</head>
<body>

<h1>Base64 - kayralrics.net</h1>

<div class="grid">

    <div class="card">
        <div class="title">Base64</div>

        <div class="content">

            <input
                type="file"
                id="file"
                accept="image/*"
            >

            <textarea
                id="input"
                placeholder="Paste Base64 here or upload an image..."
            ></textarea>

            <div class="buttons">

                <button onclick="decodeImage()">
                    Decode
                </button>

                <button onclick="imageToBase64()">
                    Image → Base64
                </button>

                <button onclick="clearAll()">
                    Clear
                </button>

                <button onclick="copyText(this)">
                    Copy
                </button>

            </div>

        </div>
    </div>

    <div class="card">
        <div class="title">Preview</div>

        <div class="content">

            <div id="preview" class="preview">
                <div class="message">
                    Image preview will appear here.
                </div>
            </div>

        </div>
    </div>

</div>

<script>
const input =
    document.getElementById("input");

const preview =
    document.getElementById("preview");

function decodeImage(){

    let value =
        input.value.trim();

    if(!value){
        preview.innerHTML =
            '<div class="message">No image.</div>';
        return;
    }

    if(!value.startsWith("data:image")){
        value =
            "data:image/png;base64," + value;
    }

    const img =
        new Image();

    img.onload = function(){
        preview.innerHTML = "";
        preview.appendChild(img);
    };

    img.onerror = function(){
        preview.innerHTML =
            '<div class="message">Invalid Base64.</div>';
    };

    img.src = value;
}

function imageToBase64(){

    const file =
        document.getElementById("file")
        .files[0];

    if(!file){
        alert("Select an image first.");
        return;
    }

    const reader =
        new FileReader();

    reader.onload =
        function(e){

            input.value =
                e.target.result;

            decodeImage();
        };

    reader.readAsDataURL(file);
}

document.getElementById("file")
.addEventListener(
    "change",
    imageToBase64
);

input.addEventListener(
    "input",
    decodeImage
);

function clearAll(){

    input.value = "";
    document.getElementById("file").value = "";

    preview.innerHTML =
        '<div class="message">Image preview will appear here.</div>';
}

async function copyText(btn){

    const text =
        input.value;

    try{
        await navigator
            .clipboard
            .writeText(text);
    }
    catch{

        input.select();
        document.execCommand("copy");
        window.getSelection().removeAllRanges();
    }

    const old =
        btn.textContent;

    btn.textContent =
        "Copied!";

    setTimeout(()=>{
        btn.textContent = old;
    },1500);
}
</script>

</body>
</html>
