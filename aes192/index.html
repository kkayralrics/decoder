<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kayralrics.net</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Consolas,monospace}
body{background:#000;color:#fff;padding:30px}
h1{text-align:center;margin-bottom:30px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
gap:20px;
}
.card{
border:1px solid #ff0000;
background:#000;
}
.title{
padding:15px;
border-bottom:1px solid #ff0000;
font-weight:bold;
}
.content{padding:20px}
input,textarea{
width:100%;
background:#000;
color:#fff;
border:1px solid #ff0000;
padding:15px;
font-size:15px;
}
input{margin-bottom:15px}
textarea{
height:300px;
resize:vertical;
}
.buttons{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}
button{
background:#000;
color:#fff;
border:1px solid #ff0000;
padding:10px 20px;
cursor:pointer;
}
button:hover{
background:#111;
}
</style>
</head>
<body>

<h1>AES-192 - kayralrics.xyz</h1>

<div class="grid">

<div class="card">
<div class="title">Input - !! AES192 bazı ortamlarda çalışmayabilir !!</ss></div>
<div class="content">

<input
type="password"
id="password"
placeholder="Password">

<textarea
id="plain"
placeholder="Text or encrypted data..."></textarea>

<div class="buttons">
<button onclick="encryptText()">Encrypt</button>
<button onclick="decryptText()">Decrypt</button>
<button onclick="copyText('plain',this)">Copy</button>
</div>

</div>
</div>

<div class="card">
<div class="title">Output - !! AES192 bazı ortamlarda çalışmayabilir !!</div>
<div class="content">

<textarea
id="output"
placeholder="Result..."></textarea>

<div class="buttons">
<button onclick="copyText('output',this)">Copy</button>
</div>

</div>
</div>

</div>

<script>
const enc = new TextEncoder();
const dec = new TextDecoder();

async function deriveKey(password, salt){

    const keyMaterial =
        await crypto.subtle.importKey(
            "raw",
            new TextEncoder().encode(password),
            "PBKDF2",
            false,
            ["deriveBits"]
        );

    const bits =
        await crypto.subtle.deriveBits(
            {
                name: "PBKDF2",
                salt,
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            192
        );

    return crypto.subtle.importKey(
        "raw",
        bits,
        {
            name: "AES-GCM"
        },
        false,
        ["encrypt", "decrypt"]
    );
}

function bytesToBase64(bytes){
    let s = "";
    for(const b of bytes){
        s += String.fromCharCode(b);
    }
    return btoa(s);
}

function base64ToBytes(str){
    const bin = atob(str);
    const out = new Uint8Array(bin.length);

    for(let i=0;i<bin.length;i++){
        out[i] = bin.charCodeAt(i);
    }

    return out;
}

async function encryptText(){

    try{

        const text =
            document.getElementById(
                "plain"
            ).value;

        const password =
            document.getElementById(
                "password"
            ).value;

        if(!password){
            alert("Enter a password.");
            return;
        }

        const salt =
            crypto.getRandomValues(
                new Uint8Array(16)
            );

        const iv =
            crypto.getRandomValues(
                new Uint8Array(12)
            );

        const key =
            await deriveKey(
                password,
                salt
            );

        const encrypted =
            await crypto.subtle.encrypt(
                {
                    name:"AES-GCM",
                    iv
                },
                key,
                enc.encode(text)
            );

        const cipher =
            new Uint8Array(encrypted);

        const result =
            new Uint8Array(
                16 + 12 + cipher.length
            );

        result.set(salt,0);
        result.set(iv,16);
        result.set(cipher,28);

        document.getElementById(
            "output"
        ).value =
            bytesToBase64(result);

    }catch(e){
        console.error(e);
        alert("Encrypt error: " + e.message);
    }
}

async function decryptText(){

    try{

        const password =
            document.getElementById(
                "password"
            ).value;

        const data =
            document.getElementById(
                "plain"
            ).value.trim();

        if(!password){
            alert("Enter a password.");
            return;
        }

        const bytes =
            base64ToBytes(data);

        const salt =
            bytes.slice(0,16);

        const iv =
            bytes.slice(16,28);

        const cipher =
            bytes.slice(28);

        const key =
            await deriveKey(
                password,
                salt
            );

        const decrypted =
            await crypto.subtle.decrypt(
                {
                    name:"AES-GCM",
                    iv
                },
                key,
                cipher
            );

        document.getElementById(
            "output"
        ).value =
            dec.decode(decrypted);

    }catch(e){
        console.error(e);
        alert(
            "Wrong password or invalid data."
        );
    }
}

async function copyText(id,btn){

    const text =
        document.getElementById(id)
        .value;

    try{
        await navigator.clipboard
            .writeText(text);
    }catch{
        const t =
            document.getElementById(id);
        t.select();
        document.execCommand("copy");
    }

    const old =
        btn.textContent;

    btn.textContent =
        "Copied!";

    setTimeout(()=>{
        btn.textContent = old;
    },1500);
}
</script>

</body>
</html>
